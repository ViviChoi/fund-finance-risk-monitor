<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 1092" font-family="Segoe UI, Helvetica, Arial, sans-serif">
<rect x="0" y="0" width="1040" height="1092" fill="#FFFFFF"/>
<text x="40" y="56" font-size="30" font-weight="700" fill="#1F3864">Fund Finance Facility Risk Monitor</text>
<text x="40" y="86" font-size="17" fill="#5A5A5A">A lender&#39;s-eye monitoring system, built as 6 composable layers (synthetic data)</text>
<text x="40" y="112" font-size="14" fill="#2E6FB0">Data flows top &#8595; bottom. Each layer = one reusable sub-problem with a borrowed open-source pattern.</text>
<circle cx="770" cy="78" r="8" fill="#27AE60"/>
<text x="783" y="83" font-size="13" fill="#5A5A5A">OK</text>
<circle cx="848" cy="78" r="8" fill="#E0A106"/>
<text x="861" y="83" font-size="13" fill="#5A5A5A">warn</text>
<circle cx="926" cy="78" r="8" fill="#C0392B"/>
<text x="939" y="83" font-size="13" fill="#5A5A5A">breach</text>
<rect x="40" y="150" width="960" height="118" rx="12" fill="#F4F7FB" stroke="#2E6FB0" stroke-width="2"/>
<rect x="40" y="150" width="78" height="118" rx="12" fill="#2E6FB0"/>
<rect x="100" y="150" width="18" height="118" fill="#2E6FB0"/>
<text x="79" y="217.0" font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="middle">L5</text>
<text x="138" y="184" font-size="20" font-weight="700" fill="#1A1A1A">Data Ingestion and Validation</text>
<text x="138" y="212" font-size="15" fill="#5A5A5A">Load LP / asset data; range-check + timestamp the inputs.</text>
<text x="138" y="242" font-size="14" font-style="italic" fill="#2E6FB0">Engineering view: the sensor layer — never trust an un-checked reading.</text>
<line x1="520.0" y1="268" x2="520.0" y2="294" stroke="#1F3864" stroke-width="2.5"/>
<polygon points="513.0,293 527.0,293 520.0,303" fill="#1F3864"/>
<rect x="40" y="302" width="960" height="118" rx="12" fill="#F4F7FB" stroke="#2E6FB0" stroke-width="2"/>
<rect x="40" y="302" width="78" height="118" rx="12" fill="#2E6FB0"/>
<rect x="100" y="302" width="18" height="118" fill="#2E6FB0"/>
<text x="79" y="369.0" font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="middle">L2</text>
<text x="138" y="336" font-size="20" font-weight="700" fill="#1A1A1A">Credit Scoring / PD</text>
<text x="138" y="364" font-size="15" fill="#5A5A5A">Turn LP credit quality into a probability of default; set eligibility.</text>
<text x="138" y="394" font-size="14" font-style="italic" fill="#2E6FB0">Engineering view: input qualification — filter out bad inputs.  (ML-ready hook)</text>
<line x1="520.0" y1="420" x2="520.0" y2="446" stroke="#1F3864" stroke-width="2.5"/>
<polygon points="513.0,445 527.0,445 520.0,455" fill="#1F3864"/>
<rect x="40" y="454" width="960" height="118" rx="12" fill="#F4F7FB" stroke="#1F3864" stroke-width="2"/>
<rect x="40" y="454" width="78" height="118" rx="12" fill="#1F3864"/>
<rect x="100" y="454" width="18" height="118" fill="#1F3864"/>
<text x="79" y="521.0" font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="middle">L1</text>
<text x="138" y="488" font-size="20" font-weight="700" fill="#1A1A1A">Borrowing Base and Exposure</text>
<text x="138" y="516" font-size="15" fill="#5A5A5A">Eligible collateral x advance rate x liquidity haircut -> max safe loan; LTV, availability, utilization.</text>
<text x="138" y="546" font-size="14" font-style="italic" fill="#1F3864">Engineering view: plant state + safety factor (derating).</text>
<line x1="520.0" y1="572" x2="520.0" y2="598" stroke="#1F3864" stroke-width="2.5"/>
<polygon points="513.0,597 527.0,597 520.0,607" fill="#1F3864"/>
<rect x="40" y="606" width="960" height="118" rx="12" fill="#F4F7FB" stroke="#2E6FB0" stroke-width="2"/>
<rect x="40" y="606" width="78" height="118" rx="12" fill="#2E6FB0"/>
<rect x="100" y="606" width="18" height="118" fill="#2E6FB0"/>
<text x="79" y="673.0" font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="middle">L3</text>
<text x="138" y="640" font-size="20" font-weight="700" fill="#1A1A1A">Stress and Scenario</text>
<text x="138" y="668" font-size="15" fill="#5A5A5A">Deterministic NAV-haircut sweep (breaking point) + Monte Carlo P(breach).</text>
<text x="138" y="698" font-size="14" font-style="italic" fill="#2E6FB0">Engineering view: worst-case fault test + random-disturbance characterisation.</text>
<line x1="520.0" y1="724" x2="520.0" y2="750" stroke="#1F3864" stroke-width="2.5"/>
<polygon points="513.0,749 527.0,749 520.0,759" fill="#1F3864"/>
<rect x="40" y="758" width="960" height="118" rx="12" fill="#F4F7FB" stroke="#1F3864" stroke-width="2"/>
<rect x="40" y="758" width="78" height="118" rx="12" fill="#1F3864"/>
<rect x="100" y="758" width="18" height="118" fill="#1F3864"/>
<text x="79" y="825.0" font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="middle">L4</text>
<text x="138" y="792" font-size="20" font-weight="700" fill="#1A1A1A">Covenant Monitor -> Trigger Engine</text>
<text x="138" y="820" font-size="15" fill="#5A5A5A">Each covenant GREEN / AMBER / RED; engine -> MONITOR / WARNING / MARGIN CALL / DEFAULT (cure period).</text>
<text x="138" y="850" font-size="14" font-style="italic" fill="#1F3864">Engineering view: protective relay with an alarm band + timed trip.</text>
<line x1="520.0" y1="876" x2="520.0" y2="902" stroke="#1F3864" stroke-width="2.5"/>
<polygon points="513.0,901 527.0,901 520.0,911" fill="#1F3864"/>
<rect x="40" y="910" width="960" height="118" rx="12" fill="#F4F7FB" stroke="#2E6FB0" stroke-width="2"/>
<rect x="40" y="910" width="78" height="118" rx="12" fill="#2E6FB0"/>
<rect x="100" y="910" width="18" height="118" fill="#2E6FB0"/>
<text x="79" y="977.0" font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="middle">OUT</text>
<text x="138" y="944" font-size="20" font-weight="700" fill="#1A1A1A">Report and Dashboard</text>
<text x="138" y="972" font-size="15" fill="#5A5A5A">One-page view for the credit committee: metrics, traffic lights, action, charts.</text>
<text x="138" y="1002" font-size="14" font-style="italic" fill="#2E6FB0">Engineering view: the control-room dashboard.</text>
</svg>